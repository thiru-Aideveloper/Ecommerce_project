{% extends 'base.html' %}

{% block content %}

<div class="row">

    

    <div class="col-md-6">

        <img src="{{ product.image.url }}" class="img-fluid rounded shadow">

    </div>

    <div class="col-md-6">
        <h2>{{ product.name }}</h2>

        <h3 class="text-success">₹{{ product.price }}</h3>

        <p>{{ product.description }}</p>

        <a href="{% url 'add_to_cart' product.id %}" class="btn btn-primary">Add To Cart</a>
    </div>

</div>

{% endblock %}
