{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>ShopEasy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-expand-lg">

    <div class="container">

        <a class="navbar-brand" href="/">ShopEasy</a>

        <div>

            <a href="{% url 'cart' %}" class="btn btn-primary btn-sm me-3">Cart ({{ request.session.cart|default:''|length }})</a>

            {% if user.is_authenticated %}
                <a href="{% url 'orders' %}" class="btn btn-info btn-sm me-2"> My Orders </a>

                <span class="text-white me-3">Welcome {{ user.username }}</span>

                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
            {% else %}
                <a href="{% url 'register' %}"
                   class="btn btn-warning btn-sm me-2">
                    Register
                </a>
                <a href="{% url 'login' %}"class="btn btn-success btn-sm">Login</a>
            {% endif %}

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

<footer class="footer text-center fixed-bottom">

<h5>ShopEasy E-Commerce</h5>

<p>Django MVT Project</p>

</footer>

</body>
</html>
